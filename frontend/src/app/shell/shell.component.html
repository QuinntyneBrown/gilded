<mat-sidenav-container class="shell-container">
  <mat-sidenav
    #sidenav
    [mode]="(isHandset$ | async) ? 'over' : 'side'"
    [opened]="(isHandset$ | async) === false"
    fixedInViewport
  >
    <mat-nav-list>
      <a mat-list-item routerLink="/search">
        <mat-icon matListItemIcon>search</mat-icon>
        Search
      </a>
      <a mat-list-item routerLink="/shortlist">
        <mat-icon matListItemIcon>bookmarks</mat-icon>
        Shortlist
      </a>
      <a mat-list-item routerLink="/notes">
        <mat-icon matListItemIcon>notes</mat-icon>
        Notes
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary">
      @if (isHandset$ | async) {
        <button
          mat-icon-button
          aria-label="Toggle navigation"
          (click)="sidenav.toggle()"
        >
          <mat-icon>menu</mat-icon>
        </button>
      }
      <span class="mat-headline-6">Gilded</span>
    </mat-toolbar>

    <main>
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
