<mat-sidenav-container class="shell-container">
  <mat-sidenav
    #sidenav
    [mode]="(isHandset$ | async) ? 'over' : 'side'"
    [opened]="(isHandset$ | async) === false"
    fixedInViewport
  >
    <mat-nav-list>
      <a mat-list-item routerLink="/search">
        <mat-icon matListItemIcon>search</mat-icon>
        Search
      </a>
      <a mat-list-item routerLink="/shortlist">
        <mat-icon matListItemIcon>bookmarks</mat-icon>
        Shortlist
      </a>
      <a mat-list-item routerLink="/notes">
        <mat-icon matListItemIcon>notes</mat-icon>
        Notes
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary">
      @if (isHandset$ | async) {
        <button
          mat-icon-button
          aria-label="Toggle navigation"
          (click)="sidenav.toggle()"
        >
          <mat-icon>menu</mat-icon>
        </button>
      }
      <span class="mat-headline-6">Gilded</span>
    </mat-toolbar>

    @if (pendingIntent()) {
      <mat-card data-appointment-banner class="appointment-banner">
        <mat-card-content>
          <mat-icon aria-hidden="true">calendar_today</mat-icon>
          You have a pending appointment. Did you book it?
        </mat-card-content>
        <mat-card-actions>
          <button mat-button color="primary" (click)="dismissIntent('booked')">
            <mat-icon>check</mat-icon>
            Booked
          </button>
          <button mat-button (click)="dismissIntent('cancelled')">
            <mat-icon>close</mat-icon>
            Cancel
          </button>
        </mat-card-actions>
      </mat-card>
    }

    <main>
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
